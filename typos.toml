# typos (crate-ci/typos) configuration — consumed by .github/workflows/typos.yml.
# NOTE the filename: typos also reads `_typos.toml`, but this repo's validate-structure §6
# scanScratch guard treats leading-underscore files as uncommittable scratch, so the equally
# supported `typos.toml` name is used instead.

[files]
# The CJK READMEs mix scripts and romanized terms (a false-positive surface with no EN dictionary
# value), and the pre-0.30 changelog archive is frozen history that is never edited.
extend-exclude = ["README.zh-TW.md", "README.ja.md", "docs/changelogs/"]

[default.extend-words]
# Project terms, accepted as-is (identity mapping = "this word is valid"). Conservative seed:
# typos only flags dictionary-known misspellings, so most coined terms never trip it anyway.
udflow = "udflow"
kktu = "kktu"
subagent = "subagent"
subagents = "subagents"
gitignored = "gitignored"
ratchet = "ratchet"
