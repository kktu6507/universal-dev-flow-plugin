# Issues use a template (no blank issues) so every report is actionable. Two forms exist:
# a "Verified udflow run" (evidence) and a "Bug report" (a hook/behavior defect). Security
# vulnerabilities go through the private channel below, never a public issue.
blank_issues_enabled: false
contact_links:
  - name: Security vulnerability (report privately)
    url: https://github.com/kktu6507/universal-dev-flow-plugin/security/policy
    about: Do NOT open a public issue for a security vulnerability. Follow the private process in SECURITY.md.
  - name: "\"Nothing happens\" / setup help"
    url: https://github.com/kktu6507/universal-dev-flow-plugin#troubleshooting
    about: Run /udflow:doctor and read the README Troubleshooting section first — most setup issues (Node missing, plugin not enabled) are covered there.
