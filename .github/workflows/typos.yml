name: Typos

# Source-wide known-typo detection via crate-ci/typos (a corrections dictionary, not a spell
# checker, so unknown project terms are not flagged by default). Config: typos.toml at the repo
# root (excludes the CJK READMEs and the frozen changelog archive; accepts project terms).
on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Check for typos
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0
