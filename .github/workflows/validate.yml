name: Validate

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Reliable, auth-free structural gate: manifests parse, required fields
      # exist, versions agree, and every agent/skill has frontmatter.
      - name: Validate plugin structure
        run: node .github/scripts/validate-structure.mjs

      # The session hooks run on every session and fail open, so a syntax error
      # would otherwise be invisible. Syntax-check and behaviorally test them.
      - name: Syntax-check hooks
        run: |
          node --check hooks/plan-gate.js
          node --check hooks/load-failure-memory.js

      - name: Run hook tests
        run: |
          test -f test/hooks.test.mjs   # guard: never let "0 tests found" pass as green
          node --test

      # Best-effort: the official validator. Non-blocking because it requires
      # the Claude Code CLI, which may not run fully headless in CI.
      - name: claude plugin validate (best-effort)
        continue-on-error: true
        run: |
          npm install -g @anthropic-ai/claude-code || exit 0
          claude plugin validate . || echo "claude plugin validate could not run headless; the checks above are the gate."
