name: Validate

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  # Cancel superseded PR runs to save CI, but NEVER cancel a master-push run — its release job must
  # not be killed mid-publish (that would leave a tag with no release). The release job's own
  # concurrency group then serializes publishes.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]   # hooks have cross-platform path logic (incl. macOS/APFS case-folding)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false   # this job only reads code + runs tests; no git push needs the token
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"

      # Reliable, auth-free structural gate: manifests parse, required fields exist,
      # versions agree, references/agents/hooks linked from SKILL.md exist, every
      # agent/skill has frontmatter, and the shipped tree has no dev/runtime artifacts.
      - name: Validate plugin structure
        run: node .github/scripts/validate-structure.mjs

      - name: Syntax-check release publisher
        run: node --check .github/scripts/publish-release.mjs

      # The session hooks run on every session and fail open, so a syntax error
      # would otherwise be invisible. Syntax-check and behaviorally test them.
      - name: Syntax-check hooks
        shell: bash
        run: |
          node --check udflow/hooks/plan-gate.js
          node --check udflow/hooks/load-failure-memory.js
          node --check udflow/hooks/orchestration-check.js
          node --check udflow/hooks/destructive-guard.js
          node --check udflow/hooks/compact-fidelity.js
          node --check udflow/hooks/contract-guard.js

      - name: Run hook tests
        shell: bash
        run: |
          # guard: never let "0 tests found" pass as green
          for f in test/helpers.mjs test/plan-gate-guards.test.mjs test/orchestration-check.test.mjs test/session-memory-hooks.test.mjs test/release-publisher.test.mjs test/validate-structure.test.mjs; do test -f "$f"; done
          node --test

      # Best-effort: the official validator. Linux-only and non-blocking because it
      # requires the Claude Code CLI, which may not run fully headless in CI.
      # --strict (treat warnings as errors) locally-verified 2026-07-10 on CLI 2.1.206: passes on
      # ./udflow, including the plugin.json $schema key. The marketplace listing this plugin
      # lives in the separate kktu6507/plugins repo, so there is no root marketplace to check here.
      - name: claude plugin validate (best-effort)
        if: runner.os == 'Linux'
        continue-on-error: true
        shell: bash
        run: |
          npm install -g @anthropic-ai/claude-code || exit 0   # adhoc-packages exception is in .github/zizmor.yml (a run-block finding can't take an inline zizmor comment)
          claude plugin validate --strict ./udflow || echo "plugin validate could not run headless; the checks above are the gate."

  # Auto-publish the release once Validate passes: the plugin manifest version is the
  # source of truth. If no matching tag/release exists, cut the annotated tag + GitHub
  # release (notes from the CHANGELOG). If the release is already published, verify its
  # deterministic archive/checksum assets and fail closed on drift unless an explicit repair
  # variable is enabled. The maintainer never tags by hand; push-to-master only.
  release:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    # Serialize releases (do NOT cancel an in-progress publish); a queued run converges via the
    # published-release guard below rather than being killed mid-publish.
    concurrency:
      group: udflow-release
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push the tag and create the release (overrides the read-only default)
      id-token: write       # mint the short-lived OIDC token attest-build-provenance signs with
      attestations: write   # write the SLSA build-provenance attestation for the release archive
    env:
      # Tag signing is OPT-IN + gated: with the UDFLOW_SIGN_PRIVATE_KEY secret set, release tags are GPG-signed
      # (GitHub "Verified"); without it the flow is unchanged (unsigned annotated tag). See SECURITY.md.
      HAS_GPG: ${{ secrets.UDFLOW_SIGN_PRIVATE_KEY != '' }}
      # Default is verify-only for already-published releases. Set this repository variable to true only
      # for an intentional repair of missing/mismatched release archive assets.
      UDFLOW_REPAIR_PUBLISHED_RELEASE_ASSETS: ${{ vars.UDFLOW_REPAIR_PUBLISHED_RELEASE_ASSETS == 'true' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0 # zizmor: ignore[artipacked] the release job's publish-release.mjs runs `git push origin <tag>` to push the (optionally signed) release tag, so this checkout must keep the token; the tree is never uploaded as an artifact
        with:
          fetch-depth: 0   # need existing tags to detect whether this version is already released
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
      - name: Import GPG signing key (only when the UDFLOW_SIGN_PRIVATE_KEY secret is set)
        if: env.HAS_GPG == 'true'
        continue-on-error: true   # a key problem must NEVER break the release — the tag step falls back to unsigned
        env:
          UDFLOW_SIGN_PRIVATE_KEY: ${{ secrets.UDFLOW_SIGN_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "$UDFLOW_SIGN_PRIVATE_KEY" | gpg --batch --import
          keyid=$(gpg --list-secret-keys --with-colons --keyid-format=long | awk -F: '/^sec:/{print $5; exit}')
          uid=$(gpg --list-keys --with-colons "$keyid" | awk -F: '/^uid:/{print $10; exit}')
          git config user.signingkey "$keyid"
          git config user.name "${uid% <*}"
          git config user.email "$(printf '%s' "$uid" | sed 's/.*<//; s/>.*//')"
          echo "Imported GPG signing key $keyid"
      - name: Publish or verify release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: node .github/scripts/publish-release.mjs

      # SLSA build provenance: attest the PUBLISHED archive so a consumer can prove it came from THIS
      # repo's CI at THIS commit (`gh attestation verify`). We download the just-published asset and
      # attest it by content — this deliberately does NOT touch publish-release.mjs (the deterministic
      # archive is already out), and re-attesting the same deterministic bytes on a no-version-bump push
      # is idempotent/harmless (verification finds a matching attestation regardless of count). Both steps
      # are continue-on-error: like GPG tag signing, a provenance hiccup must NEVER fail an
      # already-published release — provenance is strictly additive.
      - name: Download the published release archive (for attestation)
        id: download_archive
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./udflow/.claude-plugin/plugin.json').version")"
          mkdir -p _attest
          gh release download "v${version}" --pattern '*-plugin.tar.gz' --dir _attest --clobber
      - name: Attest build provenance for the release archive
        if: steps.download_archive.outcome == 'success'
        continue-on-error: true
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: _attest/*-plugin.tar.gz
