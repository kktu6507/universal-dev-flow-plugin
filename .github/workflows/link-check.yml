name: Link Check

# Dead-link detection over every Markdown file (external URLs + relative file links), via lychee.
# Weekly schedule catches external link rot; the pull_request trigger catches links a doc edit
# breaks. REQUIRED (not continue-on-error) so findings surface loudly; exclusions live in
# .lycheeignore (localhost / example domains / mailto / auth-gated GitHub template deep-links).
on:
  schedule:
    - cron: "17 4 * * 1" # weekly, Monday 04:17 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.md"
      - ".lycheeignore"
      - ".github/workflows/link-check.yml"

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Check links in Markdown files
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        env:
          # Authenticated github.com checks avoid rate-limit false positives on the many repo links.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --no-progress './**/*.md'
          fail: true
