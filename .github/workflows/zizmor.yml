name: zizmor

# Static security analysis of the GitHub Actions workflows themselves — unpinned action refs,
# template injection, over-broad `permissions:`, dangerous triggers, etc. Run as a VERSION-PINNED
# CLI via pipx (preinstalled on the runner) rather than adding another third-party Action to the
# trust surface — the clean, local core (with attest-build-provenance) chosen for Phase 1.
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Run zizmor on the workflows
        env:
          GH_TOKEN: ${{ github.token }}   # enables zizmor's online audits (e.g. resolving action refs)
        run: pipx run --spec 'zizmor==1.26.1' zizmor .github/workflows/
